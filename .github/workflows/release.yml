name: skills-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --extra dev --frozen

      - name: Run mailbox-service and bridge-service aware skill evals
        run: >
          uv run python -m pytest
          evals/test_human_bridge.py
          evals/test_owner_report_bridge_section.py
          evals
          -q
